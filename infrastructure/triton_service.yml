version: '3.8'
services:
  tritonserver:
    image: nvcr.io/nvidia/tritonserver@sha256:d8c11cd98c25dbfac5db81d6830cc106c5aa91ce9150aa84d0b28ecda9c148ca
    container_name: triton
    runtime: nvidia
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    command: tritonserver --model-repository=/models --log-verbose=1
    volumes:
      - ./models:/models
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 16G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
